{% load static %}
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMap Example</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/login_style.css' %}" />
    <script src="https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey={{ tmap_api_key }}"></script>
  </head>
  <body>
    <div id="map_div" style="width:100%; height:500px;"></div>
    
    <script>
      var map;
      var markers = [];  // 모든 마커를 저장하는 배열

      function initTmap() {
        // 지도 초기화
        map = new Tmapv2.Map("map_div", {
          center: new Tmapv2.LatLng(37.5665, 126.9780),  // 서울 시청 좌표
          width: "100%",
          height: "500px",
          zoom: 15
        });

        // Python에서 전달된 JSON 데이터를 JavaScript 배열로 변환
        var locations = JSON.parse('{{ location_data_json|safe }}');
        
        console.log(locations);  // 좌표 배열 출력

        // 마커 생성
        locations.forEach(function(location) {
          var marker = new Tmapv2.Marker({
            position: new Tmapv2.LatLng(location.lat, location.lon),
            //(나중에 마커 사진 만들면 사진넣고 주석 풀것) icon: "{% static 'images/custom_marker.png' %}",  // 사용자 정의 마커 이미지 경로 
            map: map
          });
          markers.push(marker);  // 생성된 마커를 배열에 저장
        });

        // 줌 레벨에 따라 마커를 숨기거나 표시하는 함수
        map.addListener("zoom_changed", function() {
          var zoomLevel = map.getZoom();  // 현재 줌 레벨을 가져옴
          console.log('Current Zoom Level:', zoomLevel);

          // 줌 레벨이 14 이상일 때 마커 표시, 그 이하면 마커 숨기기
          if (zoomLevel >= 14) {
            markers.forEach(function(marker) {
              marker.setVisible(true);  // 마커 보이기
            });
          } else {
            markers.forEach(function(marker) {
              marker.setVisible(false);  // 마커 숨기기
            });
          }
        });
      }

      // 페이지 로드 후 실행
      window.onload = function() {
        initTmap();
      };
    </script>
  </body>
</html>
